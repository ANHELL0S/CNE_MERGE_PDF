version: "3.8"

services:
  cne-merge-pdf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cne-merge-pdf
    ports:
      - "3010:3010"
    restart: unless-stopped
    environment:
      - PORT=3010
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3010/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
    name: dokploy-network # Red estándar de Dokploy

