version: "3.8"

services:
  cne-merge-pdf:
    build: .
    container_name: cne-merge-pdf
    ports:
      - "3010:3010"
    restart: unless-stopped
    environment:
      - PORT=3010
      - HOST=0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3010/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
